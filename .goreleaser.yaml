version: 2

project_name: codeguard

builds:
  - id: codeguard
    main: ./cmd/codeguard
    binary: codeguard
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Embed only the grammars codeguard parses (TS/TSX/JS) instead of the
    # full ~206-grammar registry: ~+4 MB binary delta instead of ~+22 MB.
    # See docs/treesitter-spike.md §5.3.
    flags:
      - -tags=grammar_subset,grammar_subset_typescript,grammar_subset_tsx,grammar_subset_javascript
    ldflags:
      - -s -w -X github.com/devr-tools/codeguard/internal/version.Number=v{{ .Version }}

archives:
  - id: codeguard
    ids:
      - codeguard
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: SHA256SUMS

# Generate a CycloneDX SBOM per archive (requires `syft` on PATH in CI).
sboms:
  - id: archive
    artifacts: archive

# Keyless cosign signing of the checksum file. Signing the checksums covers
# every released artifact. Requires `cosign` on PATH and an OIDC token
# (id-token: write) in CI; COSIGN_YES is set in the release workflow.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Keyless cosign signing of the published container images.
docker_signs:
  - cmd: cosign
    artifacts: images
    args:
      - sign
      - "${artifact}"
      - "--yes"
    output: true

dockers:
  - id: codeguard-amd64
    ids:
      - codeguard
    dockerfile: Dockerfile.release
    goos: linux
    goarch: amd64
    use: buildx
    image_templates:
      - "ghcr.io/devr-tools/codeguard:{{ .Tag }}-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
  - id: codeguard-arm64
    ids:
      - codeguard
    dockerfile: Dockerfile.release
    goos: linux
    goarch: arm64
    use: buildx
    image_templates:
      - "ghcr.io/devr-tools/codeguard:{{ .Tag }}-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/devr-tools/codeguard:{{ .Tag }}"
    image_templates:
      - "ghcr.io/devr-tools/codeguard:{{ .Tag }}-amd64"
      - "ghcr.io/devr-tools/codeguard:{{ .Tag }}-arm64"

release:
  prerelease: auto
