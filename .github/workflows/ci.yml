name: ci.yml

on:
  pull_request:
    branches:
      - develop
      - master
      - main

permissions:
  contents: read
  pull-requests: read

env:
  GOCACHE: ${{ github.workspace }}/.gocache
  GO111MODULE: "on"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

  lint:
    name: lint
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: make lint

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6

  test:
    name: test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go test directly
        shell: bash
        run: |
          set -o pipefail
          go test ./... 2>&1 | grep -v '\[no test files\]'

      - name: Run test suite
        run: make test

  codeguard:
    name: codeguard
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run repository self-scan
        run: make codeguard-ci

  build:
    name: build
    needs:
      - lint
      - test
      - codeguard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build snapshot binary
        run: make build
