name: codeguard-repo-ci
exclude:
  - .claude/**
  - .codeguard/cache.json
  - .codeguard/cache.slop-history.json
  - .codeguard/cache.perf-history.json
  - .codeguard/cache.legibility-history.json
  - .gomodcache/**
  - tests/**/.codeguard/cache.json
  # Detection-precision fixtures: intentionally vulnerable-looking sample
  # files asserted by tests/corpus/corpus_test.go; keep them out of the
  # repository self-scan.
  - tests/corpus/testdata/**
  # The tree-sitter design spike is an isolated nested Go module deliberately
  # excluded from the production build (docs/treesitter-spike.md); scanning it
  # against the root module's rules only produces noise (previously four
  # separate waivers).
  - internal/codeguard/checks/support/treesitter/**
targets:
  - name: repository
    path: ..
    language: go
    entrypoints:
      - cmd/codeguard
checks:
  quality: true
  performance: true
  design: true
  security: false
  prompts: false
  ci: true
  supply_chain: true
  quality_rules:
    max_file_lines: 400
    max_function_lines: 80
    max_parameters: 5
    max_cyclomatic_complexity: 10
  design_rules:
    god_module_threshold: 32
  performance_rules:
    hot_package_importer_threshold: 32
    rebuild_amplifier_threshold: 32
    # Dogfood the measured budget gate on artifacts that always exist in the
    # repository (dist/ is not built in CI, so a binary budget would only ever
    # report "not found"): the user-facing rule reference must stay readable
    # in one sitting.
    budgets:
      - name: checks-doc
        kind: file-size
        path: docs/checks.md
        max_bytes: 204800
      - name: readme
        kind: file-size
        path: README.md
        max_bytes: 65536
  context_rules:
    # Enforceable AI-readiness gate: warn if the repo_legibility score drops
    # below 85 (the repo currently scores 100; see docs/checks.md).
    legibility_warn_threshold: 85
  ci_rules:
    allowed_test_paths:
      - tests/**
      - internal/**
    require_workflow_dir: true
    required_workflow_files:
      - .github/workflows/ci.yml
      - .github/workflows/cd.yml
      - .github/workflows/release.yml
    workflow_content_rules:
      - path: .github/workflows/ci.yml
        required_contains:
          - make fmt-check
          - make lint
          - make test
          - make codeguard-ci
      - path: .github/workflows/cd.yml
        required_contains:
          - googleapis/release-please-action
          - "uses: ./.github/workflows/release.yml"
          - RELEASE_PLEASE_TOKEN
      - path: .github/workflows/release.yml
        required_contains:
          - goreleaser/goreleaser-action
          - sync-homebrew-formula
          - Formula/codeguard.rb
    required_release_files:
      - .goreleaser.yaml
      - Dockerfile.release
      - .github/release-please-config.json
      - .release-please-manifest.json
      - CHANGELOG.md
    required_automation_paths:
      - Makefile
      - scripts/commit.sh
output:
  format: text
