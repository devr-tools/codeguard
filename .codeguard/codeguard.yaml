name: codeguard-repo-ci
exclude:
  - .claude/**
  - .codeguard/cache.json
  - .codeguard/cache.slop-history.json
  - .gomodcache/**
  - tests/**/.codeguard/cache.json
waivers:
  - rule: quality.max-file-lines
    path: internal/codeguard/rules/catalog_quality.go
    reason: rule catalog is intentionally dense and should still be scanned by other checks
  - rule: quality.max-file-lines
    path: tests/checks/features_test.go
    reason: consolidated feature coverage is intentionally broad and should still be scanned by other checks
  - rule: ci.test-without-assertion
    path: tests/**/trust_main_test.go
    reason: Go TestMain functions bootstrap package-wide trust policy and are not assertion-bearing tests
  - rule: quality.unbounded-goroutines-in-loop
    path: internal/codeguard/runner/checks/checks.go
    reason: section workers are bounded by a NumCPU-sized semaphore before each goroutine is launched
targets:
  - name: repository
    path: ..
    language: go
    entrypoints:
      - cmd/codeguard
checks:
  quality: true
  design: true
  security: false
  prompts: false
  ci: true
  supply_chain: true
  quality_rules:
    max_file_lines: 400
    max_function_lines: 80
    max_parameters: 5
    max_cyclomatic_complexity: 10
  ci_rules:
    require_workflow_dir: true
    required_workflow_files:
      - .github/workflows/ci.yml
      - .github/workflows/cd.yml
      - .github/workflows/release.yml
    workflow_content_rules:
      - path: .github/workflows/ci.yml
        required_contains:
          - make fmt-check
          - make lint
          - make test
          - make codeguard-ci
      - path: .github/workflows/cd.yml
        required_contains:
          - googleapis/release-please-action
          - "uses: ./.github/workflows/release.yml"
          - RELEASE_PLEASE_TOKEN
      - path: .github/workflows/release.yml
        required_contains:
          - goreleaser/goreleaser-action@v7
          - sync-homebrew-formula
          - Formula/codeguard.rb
    required_release_files:
      - .goreleaser.yaml
      - Dockerfile.release
      - .github/release-please-config.json
      - .release-please-manifest.json
      - CHANGELOG.md
    required_automation_paths:
      - Makefile
      - scripts/commit.sh
output:
  format: text
